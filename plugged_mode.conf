# =============================================================================
# Plugged Mode Configuration
# =============================================================================
# Settings applied when AC adapter is connected
# =============================================================================

# Logging
LOG_FILE="$HOME/.local/share/power_modes/plugged_mode.log"
LOG_WIN_X=20
LOG_WIN_Y=20
LOG_WIN_WIDTH=1200
LOG_WIN_HEIGHT=700

# Notifications
NOTIFY_ID=7772
NOTIFY_TITLE="Plugged Mode"
NOTIFY_BODY="Performance settings applied"
NOTIFY_ICON="battery-full"
SOUND="/usr/share/sounds/freedesktop/stereo/complete.oga"

# Power Profile
POWER_PROFILE="performance"

# GPU Mode (used only if ENABLE_GPU_SWITCH=1 in main script)
GPU_MODE="nvidia"

# Display Settings
REFRESH_RATE=165
SCREEN_BRIGHTNESS=100      # 0-100 percentage (may not work on all external monitors)

# NVIDIA PowerMizer Mode (0=adaptive, 1=max performance)
NVIDIA_POWERMIZER_MODE=1

# Desktop Effects
CINNAMON_REDUCE_ANIMATIONS=0

# Screensaver/Lock Screen
SCREENSAVER_MODE="xscreensaver"  # Options: "cinnamon" or "xscreensaver"
# When "cinnamon": Ctrl+Alt+L uses Cinnamon lock screen
# When "xscreensaver": Ctrl+Alt+L triggers xscreensaver-command -lock

# Bluetooth
BLUETOOTH_ON=1
BLUETOOTH_OFF=0

# Audio
SINK_VOLUME="0%"
MIC_MUTE=1

# Keyboard Backlight
KBD_BACKLIGHT_LEVEL=1

# Services to manage
SERVICES_TO_STOP=()
SERVICES_TO_START=()
