# =============================================================================
# Battery Mode Configuration
# =============================================================================
# Settings applied when running on battery power
# =============================================================================

# Logging
LOG_FILE="$HOME/.local/share/power_modes/battery_mode.log"
LOG_WIN_X=20
LOG_WIN_Y=20
LOG_WIN_WIDTH=1200
LOG_WIN_HEIGHT=700

# Notifications
NOTIFY_ID=7771
NOTIFY_TITLE="Battery Mode"
NOTIFY_BODY="Battery-saving settings applied"
NOTIFY_ICON="battery-low"
SOUND="/usr/share/sounds/freedesktop/stereo/complete.oga"

# Power Profile
POWER_PROFILE="power-saver"

# GPU Mode (used only if ENABLE_GPU_SWITCH=1 in main script)
GPU_MODE="on-demand"

# Display Settings
REFRESH_RATE=60
SCREEN_BRIGHTNESS=50       # 0-100 percentage (may not work on all external monitors)

# NVIDIA PowerMizer Mode (0=adaptive, 1=max performance, 2=auto, 3=max power saving)
NVIDIA_POWERMIZER_MODE=0

# Desktop Effects
CINNAMON_REDUCE_ANIMATIONS=1

# Screensaver/Lock Screen
SCREENSAVER_MODE="cinnamon"  # Options: "cinnamon" or "xscreensaver"
# When "cinnamon": Ctrl+Alt+L uses Cinnamon lock screen
# When "xscreensaver": Ctrl+Alt+L triggers xscreensaver-command -lock

# Bluetooth
BLUETOOTH_OFF=1
BLUETOOTH_ON=0

# Audio
SINK_VOLUME="0%"
MIC_MUTE=1

# Keyboard Backlight
KBD_BACKLIGHT_LEVEL=0

# Services to manage
SERVICES_TO_STOP=()
SERVICES_TO_START=()
